<div class="app-container" [style]="{ '--primary-color': themeStyles().primary, '--orb1-color': themeStyles().orb1, '--orb2-color': themeStyles().orb2 }">
  <!-- Background Gradient -->
  <div class="gradient-bg"></div>
  
  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="content">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <span class="logo-icon">🧘</span>
        <span class="logo-text">ZenFocus</span>
      </div>
      <div class="session-count">
        <span class="count">{{ completedSessions() }}</span>
        <span class="label">sessions today</span>
      </div>
    </header>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button [class.active]="mode() === 'focus'" (click)="setMode('focus')">Focus</button>
      <button [class.active]="mode() === 'short'" (click)="setMode('short')">Short Break</button>
      <button [class.active]="mode() === 'long'" (click)="setMode('long')">Long Break</button>
    </div>

    <!-- Timer Display -->
    <div class="timer-section">
      <div class="circular-progress">
        <svg viewBox="0 0 100 100">
          <circle class="bg-ring" cx="50" cy="50" r="45"></circle>
          <circle 
            class="progress-ring" 
            cx="50" 
            cy="50" 
            r="45"
            [attr.stroke-dasharray]="283"
            [attr.stroke-dashoffset]="283 - (283 * progress() / 100)">
          </circle>
        </svg>
        <div class="time-display">
          <span class="time">{{ formattedTime() }}</span>
          <span class="task">{{ taskName() }}</span>
        </div>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-primary" (click)="toggleTimer()">
        {{ isRunning() ? 'Pause' : 'Start' }}
      </button>
      <button class="btn-secondary" (click)="resetTimer()">Reset</button>
    </div>

    <!-- Theme Selector -->
    <div class="theme-selector">
      <span class="theme-label">Ambience</span>
      <div class="theme-options">
        <button class="theme-btn ocean" [class.active]="theme() === 'ocean'" (click)="setTheme('ocean')"></button>
        <button class="theme-btn forest" [class.active]="theme() === 'forest'" (click)="setTheme('forest')"></button>
        <button class="theme-btn sunset" [class.active]="theme() === 'sunset'" (click)="setTheme('sunset')"></button>
        <button class="theme-btn lavender" [class.active]="theme() === 'lavender'" (click)="setTheme('lavender')"></button>
      </div>
    </div>
  </div>
</div>
